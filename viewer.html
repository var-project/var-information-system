<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>VAR Information System - Viewer</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      background-image: url("bg.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: #fff;
    }

    .viewer-screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: calc(24px + env(safe-area-inset-top)) calc(24px + env(safe-area-inset-right)) calc(24px + env(safe-area-inset-bottom)) calc(24px + env(safe-area-inset-left));
      isolation: isolate;
    }

    .viewer-overlay {
      position: absolute;
      inset: 0;
      z-index: -1;
    }

    .viewer-message {
      max-width: 90%;
      margin: 0;
      color: #fff;
      font-size: 6vw;
      line-height: 1.45;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-align: center;
      text-transform: uppercase;
      overflow-wrap: anywhere;
      /**text-shadow: 0 0 20px rgba(0, 0, 0, 0.8), 0 8px 34px rgba(0, 0, 0, 0.72);**/
      animation: messageIn 300ms ease both;
    }

    .viewer-image {
      display: none;
      max-width: 100vw;
      max-height: 100vh;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      animation: messageIn 300ms ease both;
    }

    .viewer-message.update {
      animation: none;
    }

    .connection-lost {
      position: fixed;
      right: calc(20px + env(safe-area-inset-right));
      bottom: calc(20px + env(safe-area-inset-bottom));
      z-index: 3;
      display: none;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(185, 28, 28, 0.92);
      color: #fff;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 0.05em;
    }

    .connection-lost.show {
      display: block;
    }

    @keyframes messageIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (max-width: 767px) {
      .viewer-message {
        font-size: 7vw;
        max-width: 94%;
      }

      .connection-lost {
        left: calc(16px + env(safe-area-inset-left));
        right: calc(16px + env(safe-area-inset-right));
        border-radius: 12px;
        text-align: center;
      }
    }
  </style>
</head>
<body data-page="viewer">
  <main class="viewer-screen" aria-live="polite">
    <div id="viewerOverlay" class="viewer-overlay"></div>
    <img id="viewerImage" class="viewer-image" alt="VAR status image">
    <h1 id="viewerMessage" class="viewer-message">STANDBY</h1>
  </main>
  <div id="viewerConnectionLost" class="connection-lost">CONNECTION LOST</div>

  <script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-database-compat.js"></script>
  <script>

      authDomain: "var-information-system.firebaseapp.com",

  </script>
  <script src="script.js"></script>
</body>
</html>
