<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0F172A">
  <title>VAR Information System - Controller</title>
  <style>
    :root {
      --bg: #0F172A;
      --card: #1E293B;
      --card-strong: #273449;
      --text: #F8FAFC;
      --muted: #CBD5E1;
      --line: rgba(248, 250, 252, 0.12);
      --accent: #22C55E;
      --danger: #EF4444;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100%;
      margin: 0;
      padding: 0;
      background:
        linear-gradient(180deg, rgba(15, 23, 42, 0.98), rgba(15, 23, 42, 0.94)),
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.16), transparent 34%);
      color: var(--text);
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      padding: calc(14px + env(safe-area-inset-top)) 18px 14px;
      background: rgba(15, 23, 42, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
    }

    .topbar-inner {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto minmax(260px, 0.9fr);
      gap: 16px;
      align-items: center;
      max-width: 1560px;
      margin: 0 auto;
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
      letter-spacing: 0;
      font-weight: 800;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .status-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .pill {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(30, 41, 59, 0.88);
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      background: #64748B;
      box-shadow: 0 0 0 4px rgba(100, 116, 139, 0.18);
      flex: 0 0 auto;
    }

    .dot.online {
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.2), 0 0 18px rgba(34, 197, 94, 0.55);
    }

    .dot.offline {
      background: var(--danger);
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.2), 0 0 18px rgba(239, 68, 68, 0.45);
    }

    .header-last {
      min-width: 0;
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(30, 41, 59, 0.92);
    }

    .header-last-code {
      min-width: 52px;
      min-height: 40px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: var(--card-strong);
      font-weight: 900;
      font-size: 16px;
    }

    .header-last-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 15px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .header-last-time {
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }

    .header-last-color {
      width: 38px;
      height: 20px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      background: #111827;
    }

    main {
      width: min(1560px, 100%);
      margin: 0 auto;
      padding: 22px 18px calc(34px + env(safe-area-inset-bottom));
    }

    .operation-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 18px;
      align-items: start;
    }

    .categories-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .category-card,
    .side-card,
    .custom-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .category-card {
      overflow: hidden;
      border-top: 6px solid var(--category-color, var(--accent));
    }

    .category-header {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
    }

    .category-header h2,
    .side-card h2,
    .custom-card h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .category-header p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .button-list {
      display: grid;
      gap: 12px;
      padding: 16px;
    }

    .status-button,
    .send-custom,
    .clear-button {
      width: 100%;
      min-height: 90px;
      border: 1px solid rgba(248, 250, 252, 0.16);
      border-radius: var(--radius);
      color: var(--text);
      background: linear-gradient(180deg, #334155, #253245);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 12px 22px rgba(0, 0, 0, 0.22);
      cursor: pointer;
      transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease, background 150ms ease;
    }

    .status-button {
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      text-align: left;
    }

    .status-button:active,
    .status-button.is-pressed,
    .send-custom:active,
    .clear-button:active {
      transform: scale(0.975);
      border-color: var(--category-color, var(--accent));
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.24), 0 0 26px rgba(34, 197, 94, 0.35);
    }

    .status-code {
      min-height: 54px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.78);
      color: var(--category-color, var(--accent));
      font-size: 20px;
      font-weight: 900;
    }

    .status-text {
      font-size: 16px;
      line-height: 1.25;
      font-weight: 800;
      text-transform: uppercase;
      overflow-wrap: anywhere;
    }

    .side-column {
      position: sticky;
      top: calc(102px + env(safe-area-inset-top));
      display: grid;
      gap: 18px;
    }

    .side-card,
    .custom-card {
      padding: 16px;
    }

    .last-panel {
      display: grid;
      gap: 14px;
      margin-top: 14px;
    }

    .last-big {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: center;
    }

    .last-code {
      width: 78px;
      min-height: 68px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: var(--card-strong);
      font-size: 28px;
      font-weight: 900;
    }

    .last-message {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
      font-weight: 900;
      text-transform: uppercase;
      overflow-wrap: anywhere;
    }

    .last-meta {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      font-size: 15px;
      font-weight: 800;
    }

    .color-indicator {
      width: 48px;
      height: 22px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      background: #111827;
    }

    .clear-button {
      min-height: 86px;
      margin-top: 14px;
      background: linear-gradient(180deg, #DC2626, #991B1B);
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .viewer-mode {
      display: grid;
      gap: 10px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .viewer-mode-label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .viewer-mode-toggle {
      width: 100%;
      min-height: 74px;
      border: 1px solid rgba(34, 197, 94, 0.42);
      border-radius: var(--radius);
      background: linear-gradient(180deg, #22C55E, #15803D);
      color: #052E16;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16), 0 12px 22px rgba(0, 0, 0, 0.22);
      cursor: pointer;
      font-size: 17px;
      font-weight: 900;
      transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease;
    }

    .viewer-mode-toggle.is-hidden {
      border-color: rgba(148, 163, 184, 0.44);
      background: linear-gradient(180deg, #475569, #334155);
      color: var(--text);
    }

    .viewer-mode-toggle:active {
      transform: scale(0.975);
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.2), 0 0 26px rgba(34, 197, 94, 0.28);
    }

    .custom-card {
      margin-top: 18px;
    }

    .custom-form {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 12px;
      margin-top: 14px;
    }

    .custom-input {
      width: 100%;
      min-height: 80px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 0 16px;
      background: rgba(15, 23, 42, 0.72);
      color: var(--text);
      font-size: 18px;
      font-weight: 700;
      outline: none;
    }

    .custom-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.18);
    }

    .send-custom {
      min-height: 80px;
      background: linear-gradient(180deg, #22C55E, #15803D);
      color: #052E16;
      font-size: 18px;
      font-weight: 900;
    }

    .history-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
      max-height: 430px;
      overflow: auto;
      padding-right: 2px;
    }

    .history-item {
      display: grid;
      grid-template-columns: 74px 58px 1fr;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.46);
      font-size: 14px;
      font-weight: 800;
    }

    .history-time,
    .history-message {
      color: var(--muted);
    }

    .history-message {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-transform: uppercase;
    }

    .toast {
      position: fixed;
      right: calc(18px + env(safe-area-inset-right));
      bottom: calc(18px + env(safe-area-inset-bottom));
      z-index: 100;
      min-width: 220px;
      padding: 16px 18px;
      border: 1px solid rgba(34, 197, 94, 0.5);
      border-radius: var(--radius);
      background: rgba(21, 128, 61, 0.96);
      color: #F0FDF4;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.38), 0 0 30px rgba(34, 197, 94, 0.32);
      font-size: 16px;
      font-weight: 900;
      text-align: center;
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
      transition: opacity 150ms ease, transform 150ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1199px) {
      .topbar-inner {
        grid-template-columns: 1fr;
        align-items: stretch;
      }

      .status-strip {
        justify-content: flex-start;
      }

      .operation-grid {
        grid-template-columns: 1fr;
      }

      .categories-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .side-column {
        position: static;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .last-sent-card {
        order: -1;
      }
    }

    @media (max-width: 767px) {
      .topbar {
        padding-left: 12px;
        padding-right: 12px;
      }

      .brand h1 {
        font-size: 21px;
      }

      .status-strip {
        display: grid;
        grid-template-columns: 1fr;
      }

      .pill {
        justify-content: center;
        border-radius: var(--radius);
      }

      .header-last {
        grid-template-columns: auto 1fr;
      }

      .header-last-time,
      .header-last-color {
        grid-column: 1 / -1;
      }

      main {
        padding: 14px 12px calc(28px + env(safe-area-inset-bottom));
      }

      .categories-grid,
      .side-column,
      .custom-form {
        grid-template-columns: 1fr;
      }

      .category-header,
      .button-list,
      .side-card,
      .custom-card {
        padding: 14px;
      }

      .status-button {
        min-height: 88px;
        grid-template-columns: 52px 1fr;
        padding: 12px;
      }

      .status-text {
        font-size: 16px;
      }

      .history-item {
        grid-template-columns: 66px 48px 1fr;
        gap: 8px;
      }

      .toast {
        left: calc(12px + env(safe-area-inset-left));
        right: calc(12px + env(safe-area-inset-right));
        bottom: calc(14px + env(safe-area-inset-bottom));
      }
    }

    @media (orientation: landscape) and (max-width: 900px) {
      .topbar-inner {
        grid-template-columns: 1fr 1fr;
      }

      .header-last {
        grid-column: 1 / -1;
      }

      .status-button {
        min-height: 80px;
      }
    }

    .login-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: grid;
      place-items: center;
      background:
        linear-gradient(180deg, rgba(15, 23, 42, 0.99), rgba(15, 23, 42, 0.97)),
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.16), transparent 34%);
    }

    .login-overlay.hidden {
      display: none;
    }

    .login-card {
      width: min(420px, 90vw);
      display: grid;
      gap: 20px;
      padding: 36px 32px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .login-card h2 {
      margin: 0;
      font-size: 22px;
      font-weight: 900;
      text-align: center;
      text-transform: uppercase;
    }

    .login-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      text-align: center;
    }

    .login-input {
      width: 100%;
      min-height: 56px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 0 16px;
      background: rgba(15, 23, 42, 0.72);
      color: var(--text);
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.08em;
      outline: none;
    }

    .login-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.18);
    }

    .login-input.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.18);
    }

    .login-button {
      width: 100%;
      min-height: 56px;
      border: 1px solid rgba(34, 197, 94, 0.42);
      border-radius: var(--radius);
      background: linear-gradient(180deg, #22C55E, #15803D);
      color: #052E16;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 150ms ease, box-shadow 150ms ease;
    }

    .login-button:active {
      transform: scale(0.975);
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.2), 0 0 26px rgba(34, 197, 94, 0.28);
    }

    .login-error {
      margin: 0;
      color: var(--danger);
      font-size: 14px;
      font-weight: 800;
      text-align: center;
      min-height: 20px;
    }

    .app-content {
      display: none;
    }

    .app-content.authenticated {
      display: block;
    }

    .login-brand {
      text-align: center;
    }

    .login-brand h1 {
      margin: 0 0 6px;
      font-size: 26px;
      font-weight: 900;
    }

    .login-brand p {
      margin: 0;
    }
  </style>
</head>
<body data-page="controller">
  <div id="loginOverlay" class="login-overlay">
    <div class="login-card">
      <div class="login-brand">
        <h1>VAR Information System</h1>
        <p>Controller Access</p>
      </div>
      <input id="loginPassword" class="login-input" type="password" placeholder="Enter password" autocomplete="off">
      <button id="loginButton" class="login-button" type="button">LOGIN</button>
      <p id="loginError" class="login-error"></p>
    </div>
  </div>

  <div id="appContent" class="app-content">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <h1>VAR Information System</h1>
        <p>Controller</p>
      </div>

      <div class="status-strip" aria-live="polite">
        <div class="pill"><span id="connectionDot" class="dot online"></span><span id="connectionStatus">Local File Mode</span></div>
        <div class="pill"><span id="currentDateTime">--</span></div>
      </div>

      <div class="header-last" aria-label="Last sent status">
        <div id="headerLastCode" class="header-last-code">--</div>
        <div id="headerLastText" class="header-last-text">No status sent</div>
        <div id="headerLastTime" class="header-last-time">--:--:--</div>
        <div id="headerLastColor" class="header-last-color" aria-label="Last sent color indicator"></div>
      </div>
    </div>
  </header>

  <main>
    <div class="operation-grid">
      <section>
        <div id="categoriesGrid" class="categories-grid" aria-label="VAR status categories"></div>

        <section class="custom-card" aria-labelledby="customTitle">
          <h2 id="customTitle">Custom Message</h2>
          <div class="custom-form">
            <input id="customMessage" class="custom-input" type="text" placeholder="Enter custom message..." autocomplete="off">
            <button id="sendCustom" class="send-custom" type="button">SEND</button>
          </div>
        </section>
      </section>

      <aside class="side-column">
        <section class="side-card last-sent-card" aria-labelledby="lastSentTitle">
          <h2 id="lastSentTitle">Last Sent</h2>
          <div class="last-panel">
            <div class="last-big">
              <div id="lastCode" class="last-code">--</div>
              <p id="lastMessage" class="last-message">No status sent</p>
            </div>
            <div class="last-meta">
              <span id="lastTime">--:--:--</span>
              <span id="lastColor" class="color-indicator" aria-label="Color indicator"></span>
            </div>
          </div>
          <div class="viewer-mode">
            <div class="viewer-mode-label">Viewer Message</div>
            <button id="messageToggle" class="viewer-mode-toggle" type="button" aria-pressed="true">SHOW MESSAGE</button>
          </div>
          <button id="clearButton" class="clear-button" type="button">CLEAR</button>
        </section>

        <section class="side-card" aria-labelledby="historyTitle">
          <h2 id="historyTitle">History</h2>
          <div id="historyList" class="history-list" aria-live="polite"></div>
        </section>
      </aside>
    </div>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite">Viewer Updated</div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-database-compat.js"></script>
  <script>

      apiKey: "AIzaSyD-TJX_lfRqDHal37sPggWOBu0HlMtFv0U",

      databaseURL: "https://var-information-system-default-rtdb.asia-southeast1.firebasedatabase.app",

    };
    firebase.initializeApp(firebaseConfig);
  </script>
  <script src="script.js"></script>
</body>
</html>
